name: Deploy Development

on:
  push:
    branches: [dev]

#Allow repo secrets
env:
  VITE_AUTH0_DOMAIN: ${{ secrets.VITE_DEV_AUTH0_DOMAIN }}
  VITE_AUTH0_CLIENT_ID: ${{ secrets.VITE_DEV_AUTH0_CLIENT_ID }}

jobs:
 deploy:
  runs-on: ubuntu-latest
  permissions:
    contents: write
  steps:
  - name: Check secrets
    run: |
      echo "domain secret: $VITE_AUTH0_DOMAIN"
      echo "client ID secret: $VITE_AUTH0_CLIENT_ID" 
  - uses: actions/checkout@v6
  - uses: actions/setup-node@v6
    with:
      node-version: 26
  - run: npm ci
  - run: npm run build -- --mode development
  - uses: peaceiris/actions-gh-pages@v4
    with:
      github_token: ${{ secrets.GITHUB_TOKEN }}
      publish_dir: ./dist
      destination_dir: dev # deploys to /dev/ subfolder
      cname: mph.datamidsouth.org